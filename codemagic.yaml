workflows:
  ios-build:
    name: Build iOS (unsigned IPA)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      vars:
        PROJECT_PATH: "maui/SkladTheater.Maui/SkladTheater.Maui.csproj"
    scripts:
      - name: Setup .NET 8
        script: |
          dotnet --version
          dotnet workload install maui --source https://api.nuget.org/v3/index.json
      - name: Restore packages
        script: dotnet restore $PROJECT_PATH
      - name: Build unsigned IPA
        script: |
          dotnet publish $PROJECT_PATH \
            -c Release \
            -f net8.0-ios \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:ArchiveOnBuild=true \
            -p:CodesignKey="" \
            -p:CodesignProvision="" \
            -p:EnableAssemblyILStripping=false \
            -p:UseInterpreter=true
      - name: Package IPA if needed
        script: |
          IPA_PATH=$(find maui/SkladTheater.Maui/bin/Release/net8.0-ios -name "*.ipa" -print -quit)
          if [ -z "$IPA_PATH" ]; then
            APP_PATH=$(find maui/SkladTheater.Maui/bin/Release/net8.0-ios -name "*.app" -type d -print -quit)
            if [ -n "$APP_PATH" ]; then
              mkdir -p Payload
              cp -R "$APP_PATH" Payload/
              IPA_PATH="maui/SkladTheater.Maui/bin/Release/net8.0-ios/SkladTheater-unsigned.ipa"
              zip -r "$IPA_PATH" Payload
              rm -rf Payload
            fi
          fi
          echo "IPA_PATH=$IPA_PATH"
    artifacts:
      - maui/SkladTheater.Maui/bin/Release/net8.0-ios/**/*.ipa
