name: Build iOS (unsigned IPA)

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'maui/**'
      - '.github/workflows/ios-build.yml'
      - 'global.json'

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 45

    env:
      PROJECT_PATH: maui/SkladTheater.Maui/SkladTheater.Maui.csproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Verify .NET SDK version
        run: dotnet --info

      - name: Install MAUI workload
        run: dotnet workload install maui --source https://api.nuget.org/v3/index.json

      - name: Restore packages
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build iOS app (unsigned .app)
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            -c Release \
            -f net8.0-ios \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:BuildIpa=false \
            -p:_SignApple=false \
            -p:CodesignKey=- \
            -p:CodesignProvision= \
            -p:EnableAssemblyILStripping=false \
            -p:UseInterpreter=true

      - name: Package unsigned IPA
        id: package_ipa
        run: |
          APP_PATH=$(find maui/SkladTheater.Maui/bin/Release/net8.0-ios/ios-arm64 -name "*.app" -type d -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found"
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          IPA_PATH="maui/SkladTheater.Maui/bin/Release/net8.0-ios/ios-arm64/SkladTheater-unsigned.ipa"
          zip -r "$IPA_PATH" Payload
          rm -rf Payload
          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_OUTPUT"
          echo "Found .app: $APP_PATH"
          echo "Packaged IPA: $IPA_PATH"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SkladTheater-iOS-unsigned
          path: ${{ steps.package_ipa.outputs.IPA_PATH }}

      - name: List output directory
        if: failure()
        run: |
          echo "Listing bin directories..."
          find maui/SkladTheater.Maui/bin -type f -maxdepth 6 || true
