name: Build iOS (unsigned IPA)

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'maui/**'
      - '.github/workflows/ios-build.yml'

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 45

    env:
      PROJECT_PATH: maui/SkladTheater.Maui/SkladTheater.Maui.csproj
      OUTPUT_DIR: maui/SkladTheater.Maui/bin/Release/net8.0-ios/ios-arm64/publish

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui --source https://api.nuget.org/v3/index.json

      - name: Restore packages
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Publish iOS app (unsigned)
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            -c Release \
            -f net8.0-ios \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:ArchiveOnBuild=true \
            -p:CodesignKey="" \
            -p:CodesignProvision="" \
            -p:EnableAssemblyILStripping=false \
            -p:UseInterpreter=true

      - name: Find IPA
        id: find_ipa
        run: |
          mkdir -p ${{ env.OUTPUT_DIR }}
          IPA_PATH=$(find maui/SkladTheater.Maui/bin/Release/net8.0-ios -name "*.ipa" -print -quit)
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found, trying to package .app manually"
            APP_PATH=$(find maui/SkladTheater.Maui/bin/Release/net8.0-ios -name "*.app" -type d -print -quit)
            if [ -n "$APP_PATH" ]; then
              mkdir -p Payload
              cp -R "$APP_PATH" Payload/
              IPA_PATH="${{ env.OUTPUT_DIR }}/SkladTheater-unsigned.ipa"
              zip -r "$IPA_PATH" Payload
              rm -rf Payload
            fi
          fi
          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_OUTPUT"
          echo "Found IPA: $IPA_PATH"

      - name: Upload IPA artifact
        if: steps.find_ipa.outputs.IPA_PATH != ''
        uses: actions/upload-artifact@v4
        with:
          name: SkladTheater-iOS-unsigned
          path: ${{ steps.find_ipa.outputs.IPA_PATH }}

      - name: List output directory
        if: failure()
        run: |
          echo "Listing bin directories..."
          find maui/SkladTheater.Maui/bin -type f -maxdepth 4 || true
